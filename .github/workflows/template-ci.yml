name: template-ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: template-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  self-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Verify lockfile
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --locked

      - name: Check
        run: uv run poe check

      - name: Build package
        run: uv build

  render-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        kind: [cli, lib]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --locked

      - name: Git identity
        run: |
          git config --global user.email "ci@seed.local"
          git config --global user.name "seed CI"

      - name: Render and verify generated repo (kind=${{ matrix.kind }})
        run: |
          set -euxo pipefail
          uv run seed new gen --kind "${{ matrix.kind }}" --template "$GITHUB_WORKSPACE/src/seed/_template" --dest /tmp/m
          cd /tmp/m/gen
          uv run poe check
          test ! -e .venv/bin/ruff && test ! -e .venv/bin/pyrefly
