name: Release binaries
on:
  pull_request:
  workflow_dispatch:
  push:
    tags: ["v*"]
permissions: {contents: read}
jobs:
  build:
    strategy: {fail-fast: false, matrix: {include: [{runner: macos-15, platform: darwin, arch: arm64}, {runner: ubuntu-22.04, platform: linux, arch: x86_64}]}}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: {persist-credentials: false}
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with: {enable-cache: true}
      - run: uv sync --locked --group freeze
      - name: Verify package and release versions
        env: {RELEASE_TAG: "${{ github.ref_name }}", IS_TAG: "${{ startsWith(github.ref, 'refs/tags/') }}"}
        run: |
          uv run python - <<'PY'
          import ast, os, tomllib
          from pathlib import Path
          project = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          tree = ast.parse(Path("src/seed/__init__.py").read_text())
          runtime = next(ast.literal_eval(n.value) for n in tree.body if isinstance(n, ast.Assign) and any(isinstance(t, ast.Name) and t.id == "__version__" for t in n.targets))
          if project != runtime: raise SystemExit(f"project {project} != runtime {runtime}")
          if os.environ["IS_TAG"] == "true" and os.environ["RELEASE_TAG"] != f"v{project}": raise SystemExit(f"release tag must be v{project}")
          PY
      - run: ./scripts/build-release.sh release
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with: {name: "seed-${{ matrix.platform }}-${{ matrix.arch }}", path: "release/*", if-no-files-found: error}
  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-22.04
    permissions: {contents: write}
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with: {path: release, merge-multiple: true}
      - run: (cd release && sha256sum seed-* > SHA256SUMS)
      - env: {GH_TOKEN: "${{ github.token }}", RELEASE_TAG: "${{ github.ref_name }}"}
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then exit 1; fi
          gh release create "${RELEASE_TAG}" release/* --verify-tag --generate-notes --repo "${GITHUB_REPOSITORY}"
