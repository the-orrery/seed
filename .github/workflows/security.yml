name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "41 10 * * 1"

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Export locked runtime requirements
        run: |
          uv export \
            --format requirements-txt \
            --locked \
            --no-dev \
            --no-emit-project \
            --no-header \
            --output-file requirements-audit.txt \
            >/dev/null

      - name: Audit runtime dependencies
        run: uv run --with "pip-audit==2.10.1" pip-audit -r requirements-audit.txt --disable-pip --no-deps

  actions-audit:
    name: GitHub Actions audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Audit workflows
        run: uvx "zizmor==1.26.1" --min-severity medium --min-confidence medium --format github --collect=all .github

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version: "1.25.x"

      - name: Scan for secrets
        run: go run github.com/zricethezav/gitleaks/v8@v8.30.0 detect --source . --no-banner --redact --exit-code 1

  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan for verified or unknown secrets
        uses: trufflesecurity/trufflehog@00155c9dc586f34d189adc83d3ac2698c2ec551f # v3.95.8
        with:
          extra_args: --results=verified,unknown
